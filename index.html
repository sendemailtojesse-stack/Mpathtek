<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mpathtek</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .outer-wrapper {
            display: inline-block;
        }
        table.logo-table {
            border-collapse: separate;
            border-spacing: 0;
            background-color: #1a1a1a;
            padding: 6px;
            border-radius: 4px;
        }
        table.logo-table td {
            padding: 0;
            line-height: 0;
        }
        .img-wrapper {
            position: relative;
            display: block;
            line-height: 0;
        }
        .img-wrapper img {
            display: block;
            max-width: 80vw;
            max-height: 76vh;
            object-fit: contain;
        }
        .geo-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .logo-rule {
            border: none;
            border-top: 1px solid #4a4038;
            margin: 4px 0;
            width: 100%;
        }
        .logo-link {
            display: block;
            text-align: right;
            color: #ffffff;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            opacity: 0.75;
            white-space: nowrap;
        }
        .logo-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="outer-wrapper">
        <table class="logo-table">
            <tr>
                <td>
                    <div class="img-wrapper">
                        <img src="logo.png" alt="mpathtek Logo">
                        <svg class="geo-overlay" viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
                            <polygon points="100,0 55,0 100,35" fill="rgba(80,140,180,0.38)" stroke="rgba(140,210,250,0.65)" stroke-width="0.3"/>
                            <polygon points="55,0 75,0 100,18 100,35 72,22" fill="rgba(50,110,155,0.32)" stroke="rgba(130,200,240,0.55)" stroke-width="0.3"/>
                            <polygon points="75,0 100,0 100,18" fill="rgba(110,170,210,0.28)" stroke="rgba(150,215,255,0.60)" stroke-width="0.3"/>
                            <polygon points="72,22 100,35 100,52 58,38" fill="rgba(60,120,165,0.30)" stroke="rgba(130,200,240,0.50)" stroke-width="0.3"/>
                            <polygon points="55,0 72,22 58,38 42,28 48,10" fill="rgba(45,100,145,0.24)" stroke="rgba(120,190,230,0.45)" stroke-width="0.3"/>
                            <polygon points="48,10 42,28 30,24 35,8" fill="rgba(35,90,135,0.18)" stroke="rgba(110,185,225,0.38)" stroke-width="0.3"/>
                        </svg>
                    </div>
                </td>
            </tr>
        </table>
        <hr class="logo-rule">
        <a class="logo-link" href="https://dailyhitmetrics.com/" target="_blank" rel="noopener noreferrer">dailyhitmetrics.com</a>
    </div>
</body>
</html>
