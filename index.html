<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mpathtek</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .outer-wrapper {
            display: inline-block;
        }
        table.logo-table {
            border-collapse: collapse;
            border-spacing: 0;
            background-color: #1a1a1a;
            border-radius: 4px;
        }
        td.img-cell {
            padding: 6px;
            line-height: 0;
        }
        td.geo-top-right {
            width: 80px;
            padding: 0;
            vertical-align: top;
            line-height: 0;
        }
        td.geo-bottom-right {
            padding: 0;
            vertical-align: bottom;
            line-height: 0;
        }
        td.corner-pad {
            width: 6px;
            padding: 0;
        }
        img {
            display: block;
            max-width: 80vw;
            max-height: 76vh;
            object-fit: contain;
        }
        .logo-rule {
            border: none;
            border-top: 1px solid #4a4038;
            margin: 4px 0;
            width: 100%;
        }
        .logo-link {
            display: block;
            text-align: right;
            color: #ffffff;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            opacity: 0.75;
            white-space: nowrap;
        }
        .logo-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="outer-wrapper">
        <table class="logo-table">
            <tr>
                <td class="img-cell" rowspan="2">
                    <img src="logo.png" alt="mpathtek Logo">
                </td>
                <td class="geo-top-right">
                    <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
                        <polygon points="0,0 80,0 80,80" fill="rgba(70,130,170,0.35)" stroke="rgba(130,200,240,0.65)" stroke-width="1"/>
                        <polygon points="30,0 80,0 80,40" fill="rgba(50,110,155,0.30)" stroke="rgba(120,190,230,0.55)" stroke-width="1"/>
                        <polygon points="55,0 80,0 80,22" fill="rgba(100,160,200,0.25)" stroke="rgba(150,215,255,0.60)" stroke-width="1"/>
                        <polygon points="0,0 30,0 80,40 80,80 20,50" fill="rgba(40,95,140,0.22)" stroke="rgba(110,185,225,0.45)" stroke-width="1"/>
                        <polygon points="0,0 20,50 0,40" fill="rgba(30,85,130,0.18)" stroke="rgba(100,175,215,0.38)" stroke-width="1"/>
                    </svg>
                </td>
            </tr>
            <tr>
                <td class="corner-pad"></td>
            </tr>
        </table>
        <hr class="logo-rule">
        <a class="logo-link" href="https://dailyhitmetrics.com/" target="_blank" rel="noopener noreferrer">dailyhitmetrics.com</a>
    </div>
</body>
</html>
