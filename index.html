<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mpathtek</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            body {
                align-items: flex-start;
                padding-top: 8vh;
            }
        }
        .outer-wrapper {
            display: inline-block;
        }
        table.logo-table {
            border-collapse: separate;
            border-spacing: 0;
            background-color: #1a1a1a;
            padding: 6px;
            border-radius: 4px;
        }
        table.logo-table td {
            padding: 0;
            line-height: 0;
        }
        img {
            display: block;
            max-width: 80vw;
            max-height: 76vh;
            object-fit: contain;
        }
        .logo-rule {
            border: none;
            border-top: 1px solid #4a4038;
            margin: 4px 0;
            width: 100%;
        }
        .nav-links {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 4px;
        }
        .logo-link {
            display: block;
            text-align: right;
            color: #ffffff;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            opacity: 0.75;
            white-space: nowrap;
        }
        .logo-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="outer-wrapper">
        <table class="logo-table">
            <tr>
                <td>
                    <img src="logo.png?v=2" alt="mpathtek Logo">
                </td>
            </tr>
        </table>
        <hr class="logo-rule">
        <div class="nav-links">
            <a class="logo-link" href="/contact.html">Contact</a>
            <span style="color: #4a4038; font-family: sans-serif; font-size: 14px;">|</span>
            <a class="logo-link" href="https://dailyhitmetrics.com/" target="_blank" rel="noopener noreferrer">dailyhitmetrics.com</a>
        </div>
    </div>
</body>
</html>
