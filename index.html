<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mpathtek</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .outer-wrapper {
            display: inline-block;
        }
        table.logo-table {
            border-collapse: separate;
            border-spacing: 0;
            background-color: #1a1a1a;
            padding: 6px;
            border-radius: 4px;
        }
        table.logo-table td {
            padding: 0;
            line-height: 0;
        }
        .img-wrapper {
            position: relative;
            display: inline-block;
            line-height: 0;
        }
        .geo-overlay {
            position: absolute;
            top: 0;
            right: 0;
            width: 160px;
            height: 120px;
            pointer-events: none;
        }
        img {
            display: block;
            max-width: 80vw;
            max-height: 76vh;
            object-fit: contain;
        }
        .logo-rule {
            border: none;
            border-top: 1px solid #4a4038;
            margin: 4px 0;
            width: 100%;
        }
        .logo-link {
            display: block;
            text-align: right;
            color: #ffffff;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            opacity: 0.75;
            white-space: nowrap;
        }
        .logo-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="outer-wrapper">
        <table class="logo-table">
            <tr>
                <td>
                    <div class="img-wrapper">
                    <img src="logo.png" alt="mpathtek Logo">
                    <svg class="geo-overlay" viewBox="0 0 160 120" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="fadeOut" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#000000;stop-opacity:0.0"/>
                                <stop offset="100%" style="stop-color:#000000;stop-opacity:0.55"/>
                            </linearGradient>
                            <mask id="cornerMask">
                                <rect width="160" height="120" fill="url(#fadeOut)"/>
                            </mask>
                        </defs>
                        <!-- Faceted triangular panels echoing the floor tiles -->
                        <g mask="url(#cornerMask)">
                            <!-- Row of large triangles -->
                            <polygon points="160,0 80,0 160,50" fill="rgba(100,140,160,0.45)"/>
                            <polygon points="80,0 160,50 100,0" fill="rgba(60,100,130,0.50)"/>
                            <polygon points="160,50 160,100 120,60" fill="rgba(80,120,150,0.48)"/>
                            <polygon points="120,0 160,0 160,50 120,60" fill="rgba(40,80,110,0.40)"/>
                            <!-- Mid triangles -->
                            <polygon points="80,0 120,0 120,60 60,40" fill="rgba(70,110,140,0.35)"/>
                            <polygon points="60,40 120,60 80,80 40,60" fill="rgba(50,90,120,0.38)"/>
                            <polygon points="160,100 160,120 100,120 80,80" fill="rgba(90,130,155,0.42)"/>
                            <polygon points="80,80 100,120 40,120 20,90" fill="rgba(55,95,125,0.36)"/>
                            <!-- Smaller accent triangles top-right -->
                            <polygon points="130,0 160,0 160,30" fill="rgba(120,170,200,0.30)"/>
                            <polygon points="160,30 160,60 140,45" fill="rgba(100,150,180,0.35)"/>
                            <!-- Fine edge lines -->
                            <line x1="80" y1="0" x2="160" y2="50" stroke="rgba(150,200,220,0.60)" stroke-width="1"/>
                            <line x1="120" y1="0" x2="120" y2="60" stroke="rgba(150,200,220,0.55)" stroke-width="1"/>
                            <line x1="160" y1="50" x2="80" y2="80" stroke="rgba(150,200,220,0.55)" stroke-width="1"/>
                            <line x1="60" y1="40" x2="160" y2="100" stroke="rgba(150,200,220,0.45)" stroke-width="1"/>
                            <line x1="40" y1="60" x2="160" y2="120" stroke="rgba(150,200,220,0.40)" stroke-width="1"/>
                            <line x1="100" y1="0" x2="20" y2="90" stroke="rgba(150,200,220,0.35)" stroke-width="1"/>
                        </g>
                    </svg>
                    </div>
                </td>
            </tr>
        </table>
        <hr class="logo-rule">
        <a class="logo-link" href="https://dailyhitmetrics.com/" target="_blank" rel="noopener noreferrer">dailyhitmetrics.com</a>
    </div>
</body>
</html>
