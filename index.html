<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mpathtek</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .logo-wrapper {
            position: relative;
            display: inline-block;
            max-width: 80%;
            max-height: 80vh;
        }
        img {
            display: block;
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }
        .logo-link {
            position: absolute;
            bottom: -22px;
            right: 0;
            color: #ffffff;
            text-decoration: none;
            font-family: sans-serif;
            font-size: 14px;
            opacity: 0.75;
            white-space: nowrap;
        }
        .logo-link:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="logo-wrapper">
        <!-- Replace 'logo.png' with your actual image file name if it's a .jpg or .svg -->
        <img src="logo.png" alt="mpathtek Logo">
        <a class="logo-link" href="https://dailyhitmetrics.com/" target="_blank" rel="noopener noreferrer">dailyhitmetrics.com</a>
    </div>
</body>
</html>
