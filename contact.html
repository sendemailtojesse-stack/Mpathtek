<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - MpathTek</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: sans-serif;
        }
        .container {
            background-color: #1a1a1a;
            padding: 40px 48px;
            border-radius: 4px;
            max-width: 480px;
            width: 90%;
            text-align: center;
        }
        .logo-link {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .logo-link:hover { text-decoration: underline; }
        .tagline {
            color: #aaaaaa;
            font-size: 13px;
            margin-bottom: 28px;
            font-style: italic;
        }
        hr {
            border: none;
            border-top: 1px solid #4a4038;
            margin: 0 0 28px;
        }
        h1 {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            margin: 0 0 12px;
            letter-spacing: 0.05em;
        }
        p {
            color: #aaaaaa;
            font-size: 14px;
            line-height: 1.6;
            margin: 0 0 20px;
        }
        .email-link {
            display: inline-block;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border: 1px solid #4a4038;
            padding: 10px 24px;
            border-radius: 3px;
            margin-bottom: 28px;
            transition: border-color 0.15s ease;
        }
        .email-link:hover { border-color: #888; }
        .back-link {
            display: block;
            color: #666666;
            text-decoration: none;
            font-size: 12px;
            margin-top: 8px;
        }
        .back-link:hover { color: #aaaaaa; }
    </style>
</head>
<body>
    <div class="container">
        <a class="logo-link" href="/">MpathTek</a>
        <div class="tagline">Technology for a living planet.</div>
        <hr>
        <h1>Contact</h1>
        <p>For inquiries, partnerships, or general questions, reach us at:</p>
        <a class="email-link" href="mailto:jms@mpathtek.com">jms@mpathtek.com</a>
        <a class="back-link" href="/">← Back to mpathtek.com</a>
    </div>
</body>
</html>
